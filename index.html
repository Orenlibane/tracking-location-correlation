<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מיפוי פוטנציאל לפי אזורים</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; }
    #top-banner {
      background: linear-gradient(135deg, #0f3460, #16213e);
      border-bottom: 2px solid #e94560;
      padding: 12px 24px; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    #top-banner h1 { font-size: 24px; color: #fff; margin: 0; text-shadow: 0 2px 8px rgba(233,69,96,0.4); }
    #top-banner .banner-icon { font-size: 28px; }
    #app { display: flex; height: calc(100vh - 56px); }
    #map { flex: 1; z-index: 1; }
    #sidebar {
      width: 340px; background: #16213e; overflow-y: auto;
      padding: 16px; border-left: 2px solid #0f3460;
      display: flex; flex-direction: column; gap: 12px;
    }
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      font-size: 13px; background: #0f3460; padding: 10px; border-radius: 8px;
    }
    .stat-val { font-size: 20px; font-weight: bold; color: #e94560; }
    .stat-label { color: #aaa; font-size: 11px; }
    .legend { background: #0f3460; padding: 10px; border-radius: 8px; }
    .legend h3 { font-size: 14px; margin-bottom: 8px; color: #53a8b6; }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 12px; cursor: pointer; transition: opacity 0.2s;
    }
    .legend-item:hover { opacity: 0.7; }
    .legend-item.hidden-area { opacity: 0.3; }
    .legend-checkbox {
      width: 16px; height: 16px; border-radius: 3px;
      border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer;
    }
    .legend-checkbox.checked::after { content: '✓'; }
    .legend-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
    }
    .legend-name { flex: 1; }
    .legend-count { color: #888; font-size: 11px; }
    .legend-zoom {
      background: none; border: 1px solid #334; color: #8ac0ff;
      font-size: 10px; padding: 1px 6px; border-radius: 3px; cursor: pointer;
    }
    .legend-zoom:hover { background: #1a2a4a; }
    .legend-controls { display: flex; gap: 6px; margin-bottom: 6px; }
    .legend-controls button {
      flex: 1; background: #1a1a2e; border: 1px solid #334; color: #aaa;
      padding: 4px 0; font-size: 11px; cursor: pointer; border-radius: 4px;
    }
    .legend-controls button:hover { background: #222; color: #eee; }
    .issues { background: #0f3460; padding: 10px; border-radius: 8px; }
    .issues h3 { font-size: 14px; margin-bottom: 8px; color: #e94560; }
    .issue-item {
      font-size: 11px; padding: 4px 6px; margin-bottom: 4px;
      background: rgba(233,69,96,0.15); border-radius: 4px;
      border-left: 3px solid #e94560; cursor: pointer;
    }
    .issue-item:hover { background: rgba(233,69,96,0.3); }
    .search-box {
      width: 100%; padding: 8px 12px; border-radius: 6px;
      border: 1px solid #0f3460; background: #1a1a2e; color: #eee; font-size: 13px;
    }
    .search-box:focus { outline: none; border-color: #e94560; }
    .search-box::placeholder { color: #555; }
    .toggle-row {
      display: flex; align-items: center; gap: 8px;
      background: #0f3460; padding: 8px 10px; border-radius: 8px; font-size: 12px;
    }
    .toggle-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; flex: 1; }
    .toggle-row input[type="checkbox"] { accent-color: #e94560; }
    .share-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: #25D366; color: #fff; border: none;
      padding: 10px; border-radius: 8px; font-size: 14px;
      font-weight: bold; cursor: pointer; transition: background 0.2s;
    }
    .share-btn:hover { background: #1da851; }
    .share-btn svg { width: 20px; height: 20px; fill: #fff; }
    .leaflet-popup-content-wrapper { background: #16213e; color: #eee; border-radius: 8px; }
    .leaflet-popup-tip { background: #16213e; }
    .popup-title { font-weight: bold; font-size: 14px; color: #53a8b6; }
    .popup-area { font-size: 12px; color: #aaa; margin-top: 2px; }
    .popup-status { font-size: 12px; margin-top: 4px; font-weight: bold; }
    .popup-status.ok { color: #4caf50; }
    .popup-status.bad { color: #e94560; }
    .location-label {
      background: none !important; border: none !important; box-shadow: none !important;
      font-size: 10px; color: #ccc; font-weight: bold;
      text-shadow: 1px 1px 2px #000, -1px -1px 2px #000; white-space: nowrap;
    }
    .area-label {
      background: none !important; border: none !important; box-shadow: none !important;
      font-size: 14px; color: #fff; font-weight: bold;
      text-shadow: 2px 2px 4px #000, -1px -1px 3px #000; white-space: nowrap; opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="top-banner">
    <span class="banner-icon">📍</span>
    <div><h1>מיפוי פוטנציאל לפי אזורים</h1></div>
    <span class="banner-icon">📍</span>
  </div>
  <div id="app">
    <div id="map"></div>
    <div id="sidebar">
      <input type="text" class="search-box" id="search" placeholder="חיפוש מיקום...">
      <div class="stats">
        <div><div class="stat-val" id="total-count">0</div><div class="stat-label">סה״כ מיקומים</div></div>
        <div><div class="stat-val" id="area-count">0</div><div class="stat-label">אזורים</div></div>
        <div><div class="stat-val" id="ok-count">0</div><div class="stat-label">תקינים</div></div>
        <div><div class="stat-val" id="issue-count" style="color:#e94560">0</div><div class="stat-label">חריגים</div></div>
      </div>
      <div class="toggle-row">
        <label><input type="checkbox" id="toggle-labels"> הצג שמות מיקומים</label>
        <label><input type="checkbox" id="toggle-area-labels" checked> שמות אזורים</label>
      </div>
      <div class="legend" id="legend">
        <h3>אזורים</h3>
        <div class="legend-controls">
          <button id="show-all-areas">הצג הכל</button>
          <button id="hide-all-areas">הסתר הכל</button>
        </div>
        <div id="legend-items"></div>
      </div>
      <div class="issues" id="issues-panel">
        <h3>🔴 מיקומים חריגים</h3>
        <div id="issues-list"></div>
      </div>
      <button class="share-btn" id="share-whatsapp">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        שתף ב-WhatsApp
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="area_boundaries.js"></script>
  <script>
    // AREA_BOUNDARIES loaded from area_boundaries.js
    // Each area has a polygon (array of [lat,lon]) or MultiPolygon (array of arrays)

    // Helper: check if boundary is a MultiPolygon (array of polygons)
    function isMultiPolygon(boundary) {
      return Array.isArray(boundary[0]) && Array.isArray(boundary[0][0]);
    }

    // Check if point is inside boundary (handles both Polygon and MultiPolygon)
    function pointInBoundary(point, boundary) {
      if (isMultiPolygon(boundary)) {
        return boundary.some(ring => pointInPolygon(point, ring));
      }
      return pointInPolygon(point, boundary);
    }

    const AREA_COLORS = {
      'תל אביב': '#ff6b6b',
      'ירושלים': '#ffd93d',
      'השרון': '#6bcb77',
      'הצפון': '#4d96ff',
      'המרכז': '#ff922b',
      'המפרץ': '#845ec2',
      'הדרום': '#ff6f91',
      'אשדוד': '#00c9a7'
    };

    const map = L.map('map', { center: [31.5, 34.85], zoom: 8, zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB', maxZoom: 19
    }).addTo(map);

    const areaState = {};
    const allMarkers = [];
    let issueMarkers = [];
    let showLocationLabels = false;
    let showAreaLabels = true;
    let appData = null;

    function pointInPolygon(point, polygon) {
      let inside = false;
      const [x, y] = point;
      for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        const [xi, yi] = polygon[i], [xj, yj] = polygon[j];
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
      }
      return inside;
    }

    function toggleArea(area, visible) {
      const s = areaState[area];
      if (!s) return;
      s.visible = visible;
      if (visible) {
        if (s.polygon) s.polygon.addTo(map);
        s.markers.forEach(m => m.marker.addTo(map));
        if (showLocationLabels) s.labels.forEach(l => l.addTo(map));
        if (showAreaLabels && s.areaLabel) s.areaLabel.addTo(map);
      } else {
        if (s.polygon) map.removeLayer(s.polygon);
        s.markers.forEach(m => map.removeLayer(m.marker));
        s.labels.forEach(l => map.removeLayer(l));
        if (s.areaLabel) map.removeLayer(s.areaLabel);
      }
    }

    function updateLocationLabels() {
      for (const [area, s] of Object.entries(areaState)) {
        if (s.visible && showLocationLabels) s.labels.forEach(l => l.addTo(map));
        else s.labels.forEach(l => map.removeLayer(l));
      }
    }
    function updateAreaLabels() {
      for (const [area, s] of Object.entries(areaState)) {
        if (s.visible && showAreaLabels && s.areaLabel) s.areaLabel.addTo(map);
        else if (s.areaLabel) map.removeLayer(s.areaLabel);
      }
    }

    function buildShareText() {
      if (!appData) return '';
      const { locs, issues, byArea } = appData;
      let text = `📍 *מיפוי פוטנציאל לפי אזורים - סיכום*\n\n`;
      text += `📍 סה"כ מיקומים: ${locs.length}\n`;
      text += `🟢 תקינים: ${locs.length - issues.length}\n`;
      text += `🔴 חריגים: ${issues.length}\n\n`;
      text += `*אזורים:*\n`;
      for (const [area, areaLocs] of Object.entries(byArea)) {
        const areaIssues = areaLocs.filter(l => l.issue).length;
        text += `• ${area}: ${areaLocs.length} מיקומים`;
        if (areaIssues > 0) text += ` (${areaIssues} חריגים)`;
        text += `\n`;
      }
      if (issues.length > 0) {
        text += `\n*מיקומים חריגים:*\n`;
        for (const loc of issues) text += `🔴 ${loc.name} (משויך: ${loc.area})\n`;
      }
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        text += `\n🔗 ${window.location.href}`;
      }
      return text;
    }

    fetch('locations.json')
      .then(r => r.json())
      .then(data => {
        const locs = data.locations;
        const byArea = {};
        for (const loc of locs) {
          if (!byArea[loc.area]) byArea[loc.area] = [];
          byArea[loc.area].push(loc);
        }

        // Check each location against its area's boundary polygon
        const issues = [];
        for (const loc of locs) {
          const boundary = AREA_BOUNDARIES[loc.area];
          if (boundary) {
            const inside = pointInBoundary([loc.lat, loc.lon], boundary);
            if (!inside) {
              loc.issue = true;
              issues.push(loc);
            }
          }
        }

        appData = { locs, issues, byArea };

        // Draw area boundary polygons
        for (const [area, boundary] of Object.entries(AREA_BOUNDARIES)) {
          const color = AREA_COLORS[area] || '#888';
          const areaLocs = byArea[area] || [];
          const state = { visible: true, markers: [], labels: [], polygon: null, areaLabel: null };

          // Draw the area polygon (handles both simple and multi-polygon)
          const poly = L.polygon(boundary, {
            color, fillColor: color, fillOpacity: 0.12, weight: 2, dashArray: '6, 3'
          }).addTo(map);
          poly.bindTooltip(area, { sticky: true, className: 'location-label' });
          state.polygon = poly;

          // Area label at polygon center
          const center = poly.getBounds().getCenter();
          state.areaLabel = L.marker(center, {
            icon: L.divIcon({ className: 'area-label', html: area, iconSize: [120, 20], iconAnchor: [60, 10] })
          }).addTo(map);

          // Location markers
          for (const loc of areaLocs) {
            const isIssue = loc.issue;
            const mColor = color;
            const radius = 5;
            const weight = 1;

            const circle = L.circleMarker([loc.lat, loc.lon], {
              radius, fillColor: mColor,
              color: mColor,
              weight, fillOpacity: 0.8
            }).addTo(map);

            const statusClass = isIssue ? 'bad' : 'ok';
            const statusText = isIssue
              ? `⚠️ חריג — משויך ל"${loc.area}" אבל לא נמצא בגבולות האזור`
              : '✓ תקין — נמצא בגבולות האזור';
            circle.bindPopup(`
              <div class="popup-title">${loc.name}</div>
              <div class="popup-area">אזור משויך: ${loc.area}</div>
              <div class="popup-status ${statusClass}">${statusText}</div>
              <div style="font-size:11px;color:#666;margin-top:4px">${loc.lat.toFixed(4)}, ${loc.lon.toFixed(4)}</div>
            `);

            state.markers.push({ marker: circle, loc });
            allMarkers.push({ marker: circle, loc });
            if (isIssue) issueMarkers.push({ marker: circle, loc });

            // Location label
            const labelColor = '#ccc';
            const label = L.marker([loc.lat, loc.lon], {
              icon: L.divIcon({
                className: 'location-label',
                html: `<span style="color:${labelColor}">${loc.name}</span>`,
                iconSize: [80, 14], iconAnchor: [40, -6]
              })
            });
            state.labels.push(label);
          }

          areaState[area] = state;
        }

        // Stats
        document.getElementById('total-count').textContent = locs.length;
        document.getElementById('area-count').textContent = Object.keys(byArea).length;
        document.getElementById('ok-count').textContent = locs.length - issues.length;
        document.getElementById('issue-count').textContent = issues.length;

        // Legend
        const legendItems = document.getElementById('legend-items');
        for (const [area, areaLocs] of Object.entries(byArea)) {
          const color = AREA_COLORS[area] || '#888';
          const areaIssues = areaLocs.filter(l => l.issue).length;
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `
            <span class="legend-checkbox checked" style="border-color:${color};color:${color}" data-area="${area}"></span>
            <span class="legend-dot" style="background:${color}"></span>
            <span class="legend-name">${area}</span>
            <span class="legend-count">${areaLocs.length}${areaIssues > 0 ? ` <span style="color:#e94560">(${areaIssues}🔴)</span>` : ''}</span>
            <button class="legend-zoom" data-area="${area}" title="זום לאזור">⊕</button>
          `;
          item.querySelector('.legend-checkbox').addEventListener('click', (e) => {
            const cb = e.target, a = cb.dataset.area;
            const isChecked = cb.classList.toggle('checked');
            item.classList.toggle('hidden-area', !isChecked);
            toggleArea(a, isChecked);
          });
          item.querySelector('.legend-zoom').addEventListener('click', (e) => {
            e.stopPropagation();
            const a = e.target.dataset.area, s = areaState[a];
            if (!s.visible) {
              item.querySelector('.legend-checkbox').classList.add('checked');
              item.classList.remove('hidden-area');
              toggleArea(a, true);
            }
            if (s.polygon) {
              map.fitBounds(s.polygon.getBounds(), { padding: [50, 50] });
            }
          });
          legendItems.appendChild(item);
        }

        document.getElementById('show-all-areas').addEventListener('click', () => {
          legendItems.querySelectorAll('.legend-checkbox').forEach(cb => {
            cb.classList.add('checked'); cb.closest('.legend-item').classList.remove('hidden-area');
          });
          for (const a of Object.keys(areaState)) toggleArea(a, true);
        });
        document.getElementById('hide-all-areas').addEventListener('click', () => {
          legendItems.querySelectorAll('.legend-checkbox').forEach(cb => {
            cb.classList.remove('checked'); cb.closest('.legend-item').classList.add('hidden-area');
          });
          for (const a of Object.keys(areaState)) toggleArea(a, false);
        });

        // Issues list
        const issuesList = document.getElementById('issues-list');
        if (issues.length === 0) {
          issuesList.innerHTML = '<div style="color:#4caf50;font-size:12px">אין מיקומים חריגים 🎉</div>';
        } else {
          for (const loc of issues) {
            const item = document.createElement('div');
            item.className = 'issue-item';
            item.textContent = `${loc.name} → ${loc.area}`;
            item.addEventListener('click', () => {
              map.setView([loc.lat, loc.lon], 12);
              const m = issueMarkers.find(im => im.loc === loc);
              if (m) m.marker.openPopup();
            });
            issuesList.appendChild(item);
          }
        }

        // Search
        document.getElementById('search').addEventListener('input', (e) => {
          const q = e.target.value.trim().toLowerCase();
          for (const { marker, loc } of allMarkers) {
            const match = !q || loc.name.toLowerCase().includes(q) || loc.area.toLowerCase().includes(q);
            marker.setStyle({ opacity: match ? 1 : 0.1, fillOpacity: match ? 0.8 : 0.1 });
          }
        });

        document.getElementById('toggle-labels').addEventListener('change', (e) => {
          showLocationLabels = e.target.checked; updateLocationLabels();
        });
        document.getElementById('toggle-area-labels').addEventListener('change', (e) => {
          showAreaLabels = e.target.checked; updateAreaLabels();
        });
        document.getElementById('share-whatsapp').addEventListener('click', () => {
          const text = buildShareText();
          window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        });
      })
      .catch(err => {
        console.error('Failed to load locations:', err);
        document.getElementById('issues-list').innerHTML =
          '<div style="color:#e94560">Error loading data.</div>';
      });
  </script>
</body>
</html>
